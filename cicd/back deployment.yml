apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediq-backend-DEPLOY_COLOR
  labels:
    app: mediq-backend
    color: DEPLOY_COLOR
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediq-backend
      color: DEPLOY_COLOR
  template:
    metadata:
      labels:
        app: mediq-backend
        color: DEPLOY_COLOR
    spec:
      containers:
        - name: mediq-backend
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_USER
            - name: JWT_EXPIRE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: JWT_EXPIRE
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: APP_FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: APP_FRONTEND_URL
            - name: KAKAO_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KAKAO_REDIRECT_URI
            - name: MAIL_ADDR
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MAIL_ADDR
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_PROFILES_ACTIVE
            - name: UPLOAD_PATH
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: UPLOAD_PATH
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: PORTONE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: PORTONE_API_SECRET
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: KAKAO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: KAKAO_CLIENT_SECRET
            - name: MAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MAIL_PASS